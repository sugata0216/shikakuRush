<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
</head>
<body>
<div>
  <!-- ✅ fetchからThymeleafの通常フォームに変更 -->
  <form th:action="@{/user/login}" method="post">

    <h1>ログイン</h1>

    <!-- ✅ サーバーから渡されたエラーメッセージを表示 -->
    <p th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <label>メールアドレス</label>
    <input name="email" type="email" required>

    <label>パスワード</label>
    <input name="password" type="password" required>

    <a href="/user/password-reset-email">パスワードを忘れた方はこちら ▶</a>
    <button type="submit">ログイン</button>
    <a href="/user/registered-email">新規登録はこちら ▶</a>

  </form>
</div>

<!-- ✅ JavaScriptのfetch処理は不要になるので全削除 -->

</body>
</html>
