<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>パスワード再設定</title>
</head>
<body>
<div>
  <h1>パスワード再設定</h1>
  <div id="tokenError">
    <p>このリンクは無効または期限切れです。<a href="/user/password-reset-email">再度メールアドレスを入力してください ▶</a></p>
  </div>
  <form onsubmit="handleReset(); return false;">
    <label>新しいパスワード</label>
    <input id="password" type="password">
    <span id="passwordError"></span>
    <label>パスワード再入力</label>
    <input id="passwordConfirm" type="password">
    <span id="passwordConfirmError"></span>
    <p id="formError"></p>
    <button id="resetBtn" type="submit">パスワードを変更する</button>
  </form>
</div>

<script>
  const token = new URLSearchParams(location.search).get('token');
  if (!token) {
    document.getElementById('tokenError').style.display = 'block';
    document.getElementById('resetBtn').style.display = 'none';
  }

  async function handleReset() {
    clearErrors();
    const password        = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('passwordConfirm').value;
    let valid = true;

    if (!password) {
      showError('passwordError', 'パスワードを入力してください'); valid = false;
    } else if (password.length < 8) {
      showError('passwordError', 'パスワードは8文字以上で入力してください'); valid = false;
    }

    if (!passwordConfirm) {
      showError('passwordConfirmError', 'パスワードを再入力してください'); valid = false;
    } else if (password !== passwordConfirm) {
      showError('passwordConfirmError', 'パスワードが一致しません'); valid = false;
    }

    if (!valid) return;

    setLoading(true);
    try {
      const res  = await fetch('/api/auth/password-reset/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password, passwordConfirm })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message, { cause: data.code });
      window.location.href = '/user/password-reset-complete';
    } catch (err) {
      if (err.cause === 'TOKEN_EXPIRED' || err.cause === 'TOKEN_INVALID') {
        document.getElementById('tokenError').style.display = 'block';
        document.getElementById('resetBtn').style.display = 'none';
      } else {
        showError('formError', err.message || 'パスワードの変更に失敗しました。しばらく経ってからお試しください');
      }
    } finally {
      setLoading(false);
    }
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function clearErrors() {
    document.querySelectorAll('[id$="Error"]').forEach(el => {
      el.textContent = '';
      el.style.display = 'none';
    });
  }

  function setLoading(loading) {
    const btn = document.getElementById('resetBtn');
    btn.disabled    = loading;
    btn.textContent = loading ? '送信中...' : 'パスワードを変更する';
  }
</script>
</body>
</html>
