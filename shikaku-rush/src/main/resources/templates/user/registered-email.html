<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>登録用メールアドレス</title>
</head>
<body>
<div>
  <h1>新規登録</h1>
  <label>登録用メールアドレス</label>
  <input id="email" type="email">
  <span id="emailError"></span>
  <p id="formError"></p>
  <p id="sentMessage">確認メールを送信しました。メール内のリンクから登録を続けてください。</p>
  <button id="sendBtn" onclick="handleSendEmail()">メールを送る</button>
  <a href="/user/login">↲</a>
</div>

<script>
  async function handleSendEmail() {
    clearErrors();
    const email = document.getElementById('email').value.trim();

    if (!email) { showError('emailError', 'メールアドレスを入力してください'); return; }

    setLoading(true);
    try {
      const res  = await fetch('/api/auth/register/send-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message);
      document.getElementById('sendBtn').style.display = 'none';
      document.getElementById('sentMessage').style.display = 'block';
    } catch (err) {
      showError('formError', err.message || 'メールの送信に失敗しました。しばらく経ってからお試しください');
    } finally {
      setLoading(false);
    }
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function clearErrors() {
    document.querySelectorAll('[id$="Error"]').forEach(el => {
      el.textContent = '';
      el.style.display = 'none';
    });
  }

  function setLoading(loading) {
    const btn = document.getElementById('sendBtn');
    btn.disabled    = loading;
    btn.textContent = loading ? '送信中...' : 'メールを送る';
  }
</script>
</body>
</html>
